<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="robots" content="noindex, nofollow">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');
        :root {
            --ink: #0d0d0d; --cream: #f5f0e8;
            --gold: #c9a84c; --muted: #6b6560;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink); color: var(--cream);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }
        .wrap { max-width: 560px; }
        .num {
            font-family: 'Playfair Display', serif;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 900; color: var(--gold);
            line-height: 1; margin-bottom: 1rem;
            opacity: 0.15;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 900; margin-bottom: 1rem;
        }
        p {
            color: rgba(245,240,232,0.55);
            font-size: 1rem; line-height: 1.8;
            font-weight: 300; margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block; background: var(--gold);
            color: var(--ink); text-decoration: none;
            font-weight: 700; font-size: 0.85rem;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 1rem 2.5rem; border-radius: 2px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .links {
            margin-top: 2rem; display: flex;
            justify-content: center; gap: 2rem; flex-wrap: wrap;
        }
        .links a {
            color: rgba(245,240,232,0.4); font-size: 0.85rem;
            text-decoration: none; transition: color 0.2s;
        }
        .links a:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="num">404</div>

        <p>Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="https://afroza-joba.github.io/" class="btn">← Back to Home</a>
        <div class="links">
            <a href="https://afroza-joba.github.io/#services">Services</a>
            <a href="https://afroza-joba.github.io/#about">About</a>
            <a href="https://afroza-joba.github.io/#contact">Contact</a>
